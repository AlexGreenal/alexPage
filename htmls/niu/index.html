<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>牛年快乐-Alex 的个人主页</title>
	<style>
		body{
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			flex-direction: column;
		}
		
		.total{
			width: 80%;
			height: auto;
			display: flex;
			justify-content: center;
			align-items: center;
			background: white;
			border-radius: 15px;
			border: none;
			box-shadow: 0 12px 5px -10px rgba(0,0,0,0.1), 0 0 4px 0 rgba(0,0,0,0.1);
			-webkit-box-shadow: 0 12px 5px -10px rgba(0,0,0,0.1), 0 0 4px 0 rgba(0,0,0,0.1);

		}
		img{
			width:100%;
			height: auto;
			border-radius: 15px;
		}
		.in{
			width: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}
		a {
			text-decoration: none;
			 -webkit-transition-duration: 0.4s;
			 transition-duration: 0.4s;
			 padding: 8px 16px;
			 text-align: center;
			 background-color: white;
			 color: black;
			 border: 2px solid #4CAF50;
			 border-radius:5px;
		}
		a:hover {
			text-decoration: none;
			 background-color: #4CAF50;
			 color: white;
		 }
	</style>
</head>

<body>
	<div class="total">
		<img src="img.jpg" />
	</div>
	<div class="in">
		<a href="img.jpg" download="happy_new_year.jpg">下载</a>
	</div>
</body>
</html>
